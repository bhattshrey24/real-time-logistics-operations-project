services:
  # ─────────────────────────────────────────────
  # KAFKA BROKER 1
  # Runs as both broker + controller (KRaft combined mode)
  # Exposed to host on port 9092
  # ─────────────────────────────────────────────
  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-1 # Internal name by which other containers can reach this broker
    container_name: kafka-1 # Actual Docker container name
    ports:
      - "9092:9092"       # External access from your machine / PyCharm. It maps container port 9092 to your machine's port 9092
    environment:
      KAFKA_NODE_ID: 1    # Unique ID of this broker/controller in the cluster — must match QUORUM_VOTERS list
      KAFKA_PROCESS_ROLES: broker,controller   # KRaft combined mode (Since this broker works as both broker and controller)

      # Three listener types:
      # PLAINTEXT  → internal broker-to-broker communication
      # EXTERNAL   → how your host machine (PyCharm producer) connects
      # CONTROLLER → Used for Controller ↔ Controller communication for Leader election, Metadata synchronization etc
      # Note : PLAINTEXT, EXTERNAL, CONTROLLER are listeners that we created and each satisfy a different purpose
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,EXTERNAL://localhost:9092 # Addresses Kafka tells clients and other brokers to use when connecting like PLAINTEXT://kafka-1:29092 → Other brokers should reach this broker using hostname kafka-1 and EXTERNAL://localhost:9092 → External clients should connect using localhost:9092.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT # Defines which protocol each listener uses. In production this might look like EXTERNAL : SSL, CONTROLLER : SSL, PLAINTEXT : PLAINTEXT (here "PLAINTEXT" on the right actually means Kafkas PLAINTEXT security protocol which as no encryption, no authentication)
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT # This tells Kafka Which listener should brokers use to talk to other brokers. So the listener name is PLAINTEXT because CONTROLLER and EXTERNAL is used for other purposes
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # All 3 brokers participate in controller quorum
      # Format: nodeId@hostname:controllerPort
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093 # List of all controller nodes that participate in leader election and metadata management

      # Same CLUSTER_ID across all brokers — generated once for the cluster
      # Generate using command: docker run --rm confluentinc/cp-kafka:7.6.0 kafka-storage random-uuid
      CLUSTER_ID: ${KAFKA_CLUSTER_ID} 

      KAFKA_LOG_DIRS: /var/lib/kafka/data # Location where Kafka stores partition data and logs in docker

      # Replication settings — set to 3 so all brokers hold a copy
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3 # Consumer offset data is stored on all 3 brokers.
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3 # Transaction metadata is replicated to all 3 brokers.
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2         # At least 2 replicas must be in sync for transaction writes.
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3      # New topics get 3 replicas by default.
      KAFKA_MIN_INSYNC_REPLICAS: 2    # At least 2 replicas must acknowledge a write for it to be considered successful.
    volumes:
      - kafka-1-data:/var/lib/kafka/data # Persists Kafka data even if the container restarts.

  # ─────────────────────────────────────────
  # KAFKA BROKER 2
  # Exposed to host on port 9093
  # ─────────────────────────────────────────
  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-2
    container_name: kafka-2
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - kafka-2-data:/var/lib/kafka/data

  # ─────────────────────────────────────────
  # KAFKA BROKER 3
  # Exposed to host on port 9094
  # ─────────────────────────────────────────
  kafka-3:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-3
    container_name: kafka-3
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - kafka-3-data:/var/lib/kafka/data

  # ─────────────────────────────────────────
  # REDPANDA CONSOLE (UI)
  # Access at http://localhost:8080
  # Connects to brokers via internal Docker network
  # ─────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:v2.4.6
    container_name: redpanda-console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: kafka-1:29092,kafka-2:29092,kafka-3:29092   # Internal listener
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
  # ─────────────────────────────────────────
  # MinIo (Data Lake / Delta Lake) (It pretends to be S3 running locally, So spark or other tools use MinIO Api to write to it just like how they would have written to S3)
  # MinIO API        -> http://localhost:9000
  # MinIO Console    -> http://localhost:9001
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER} # Actuall value present in .env
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  # ─────────────────────────────────────────
  # SPARK MASTER
  # Web UI: http://localhost:8081 (cluster overview)
  # App UI: http://localhost:4040   (live job, only while running)
  # ─────────────────────────────────────────
  spark-master:
    image: apache/spark:4.1.2
    container_name: spark-master
    hostname: spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"    # Spark master port (workers + drivers connect here)
      - "8081:8080"    # Master Web UI
      - "4040:4040"    # Application UI (active while a job is running)
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/logs:/opt/spark/logs   # shared with history server

  # ─────────────────────────────────────────
  # SPARK WORKER
  # Web UI: http://localhost:8082 (tasks on this worker)
  # ─────────────────────────────────────────
  spark-worker:
    image: apache/spark:4.1.2
    container_name: spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    ports:
      - "8082:8081"    # Worker Web UI
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/logs:/opt/spark/logs   # shared with history server
  # ─────────────────────────────────────────────────────────────
  # SPARK HISTORY SERVER 
  # UI:
  # Web UI : http://localhost:18080  (all completed jobs)
  # Requires your jobs to be submitted with:
  #   --conf spark.eventLog.enabled=true
  #   --conf spark.eventLog.dir=file:/opt/spark/logs
  # ─────────────────────────────────────────────────────────────
  # spark-history:
  #   image: apache/spark:4.1.2
  #   container_name: spark-history
  #   hostname: spark-history
  #   depends_on:
  #     - spark-master
  #   command: >
  #     /opt/spark/bin/spark-class
  #     org.apache.spark.deploy.history.HistoryServer
  #   ports:
  #     - "18080:18080"  # History Server Web UI
  #   environment:
  #     SPARK_NO_DAEMONIZE: "true"
  #     SPARK_HISTORY_OPTS: >-
  #       -Dspark.history.fs.logDirectory=file:/opt/spark/logs
  #   volumes:
  #     - ./spark/logs:/opt/spark/logs   # same mount as master + worker

  # ─────────────────────────────────────────
  # POSTGRES
  # Used as the metadata database for Airflow
  # Port: 5432
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 10s
      retries: 5

  # ─────────────────────────────────────────
  # AIRFLOW INIT
  # One-shot container: runs DB migrations and creates the admin user,
  # then exits. webserver/scheduler wait for it to succeed.
  # ─────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.2
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-changeme}
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username $$_AIRFLOW_WWW_USER_USERNAME --password $$_AIRFLOW_WWW_USER_PASSWORD --firstname Admin --lastname User --role Admin --email admin@example.com"

  # ─────────────────────────────────────────
  # AIRFLOW WEBSERVER
  # UI: http://localhost:8085
  # Default login: admin / admin
  # ─────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.2
    container_name: airflow-webserver
    hostname: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8085:8080"    # Airflow UI
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-changeme}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: webserver

  # ─────────────────────────────────────────
  # AIRFLOW SCHEDULER
  # Parses DAGs and triggers task instances
  # ─────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.9.2
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-changeme}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: scheduler

# This stores our kafka data/ messages and MinIO data into docker storage , otherwise if we run "docker compose down"
# then everything will be deleted from kafka and minIo
volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
  minio-data:
  postgres-data:
